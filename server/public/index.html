<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tennis App - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f1f5f9;
        }
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }
        .status-badge {
            transition: all 0.3s ease;
        }
    </style>
</head>
<body class="min-h-screen bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-slate-900 via-[#0f172a] to-black p-6">
    <div class="max-w-7xl mx-auto space-y-8">
        <!-- Header -->
        <header class="flex justify-between items-center glass-panel rounded-2xl p-6">
            <div>
                <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400">Tennis App Command Center</h1>
                <p class="text-slate-400 text-sm mt-1">Manage local devices and generate access PINs</p>
            </div>
            <div class="flex items-center space-x-4">
                <div class="animate-pulse flex items-center space-x-2">
                    <div class="h-3 w-3 bg-emerald-500 rounded-full"></div>
                    <span class="text-emerald-400 font-medium">Server Online</span>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Left Column: Generate PIN -->
            <div class="lg:col-span-1 space-y-6">
                <div class="glass-panel rounded-2xl p-6">
                    <h2 class="text-xl font-semibold mb-4 flex items-center">
                        <svg class="w-5 h-5 mr-2 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path></svg>
                        Generate Access PIN
                    </h2>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-300 mb-1">Duration</label>
                            <select id="duration" onchange="toggleCustomDuration()" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 text-white focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                                <option value="30">30 Minutes</option>
                                <option value="60" selected>1 Hour</option>
                                <option value="custom">Custom...</option>
                            </select>
                            <div id="customDurationContainer" class="hidden mt-3 grid grid-cols-2 gap-3">
                                <div>
                                    <label class="block text-xs font-medium text-slate-400 mb-1">Hours</label>
                                    <input type="number" id="customHours" placeholder="0" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 text-white focus:ring-2 focus:ring-blue-500 outline-none transition-all" min="0">
                                </div>
                                <div>
                                    <label class="block text-xs font-medium text-slate-400 mb-1">Minutes</label>
                                    <input type="number" id="customMins" placeholder="0" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 text-white focus:ring-2 focus:ring-blue-500 outline-none transition-all" min="0">
                                </div>
                            </div>
                        </div>
                        
                        <button onclick="generatePin()" class="w-full bg-gradient-to-r from-blue-500 to-blue-600 hover:from-blue-400 hover:to-blue-500 text-white font-medium py-3 rounded-lg shadow-lg shadow-blue-500/30 transition-all active:scale-[0.98]">
                            Generate New PIN
                        </button>
                    </div>

                    <div id="pinResult" class="hidden mt-6 p-6 rounded-xl border border-emerald-500/30 bg-emerald-500/10 text-center relative overflow-hidden">
                        <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,rgba(16,185,129,0.1)_0,transparent_100%)]"></div>
                        <p class="text-sm text-emerald-400 font-medium mb-1 relative z-10">Your Code</p>
                        <p id="generatedPinText" class="text-4xl font-bold text-white tracking-widest relative z-10">------</p>
                        <p id="generatedDuration" class="text-xs text-slate-400 mt-2 relative z-10">Valid for -- mins</p>
                    </div>
                </div>

                <div class="glass-panel rounded-2xl p-6">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-semibold flex items-center">
                            Recent Sessions
                            <span id="sessionsCount" class="ml-2 text-xs bg-slate-700 text-slate-300 px-2 py-0.5 rounded-full hidden">0</span>
                        </h2>
                        <button onclick="clearSessions()" class="text-xs bg-slate-800 hover:bg-red-500/20 hover:text-red-400 border border-slate-700 px-3 py-1.5 rounded transition-colors">Clear All</button>
                    </div>
                    <div id="sessionsList" class="space-y-2 max-h-[360px] overflow-y-auto pr-2 custom-scrollbar">
                        <!-- Loaded dynamically -->
                        <p class="text-slate-500 text-sm text-center py-4">Loading sessions...</p>
                    </div>
                    <div id="showMoreContainer" class="hidden mt-3">
                        <button onclick="loadMoreSessions()" id="showMoreBtn" class="w-full text-xs text-slate-400 hover:text-white bg-slate-800/50 hover:bg-slate-700/50 border border-slate-700/50 py-2 rounded-lg transition-colors">
                            Show More
                        </button>
                    </div>
                </div>
            </div>

            <!-- Right Column: Devices -->
            <div class="lg:col-span-2">
                <div class="glass-panel rounded-2xl p-6 h-full">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-xl font-semibold flex items-center">
                            <svg class="w-5 h-5 mr-2 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                            Connected Devices
                        </h2>
                        <div class="flex space-x-2">
                            <button onclick="clearDevices()" class="text-xs bg-slate-800 hover:bg-red-500/20 hover:text-red-400 border border-slate-700 px-3 py-2 rounded transition-colors">
                                Clear All
                            </button>
                            <button onclick="fetchDevices()" class="p-2 text-slate-400 hover:text-white hover:bg-slate-800 rounded-lg transition-colors">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                            </button>
                        </div>
                    </div>

                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="border-b border-slate-700/50 text-slate-400 text-sm">
                                    <th class="pb-3 font-medium">Device ID</th>
                                    <th class="pb-3 font-medium">Status</th>
                                    <th class="pb-3 font-medium">Battery</th>
                                    <th class="pb-3 font-medium">Last Sync</th>
                                    <th class="pb-3 font-medium text-right">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="devicesTable" class="divide-y divide-slate-800/50">
                                <!-- Loaded dynamically -->
                                <tr><td colspan="5" class="py-8 text-center text-slate-500">Loading devices...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // API Base URL (Empty means same host)
        const API_BASE = '/api/admin';

        async function fetchDevices() {
            try {
                const res = await fetch(`${API_BASE}/devices`);
                const devices = await res.json();
                
                const tbody = document.getElementById('devicesTable');
                tbody.innerHTML = '';
                
                if (devices.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="py-8 text-center text-slate-500">No devices registered yet.</td></tr>';
                    return;
                }

                devices.forEach(d => {
                    const statusColors = {
                        'IN_USE': 'bg-blue-500/20 text-blue-400 border-blue-500/30',
                        'LOCKED': 'bg-amber-500/20 text-amber-400 border-amber-500/30',
                        'OFFLINE': 'bg-slate-700/50 text-slate-400 border-slate-600'
                    };
                    const badgeClass = statusColors[d.status] || statusColors['OFFLINE'];
                    
                    const batColor = d.battery_level > 20 ? 'text-emerald-400' : 'text-red-400';
                    const lastSync = new Date(d.last_heartbeat.replace(' ', 'T') + 'Z').toLocaleTimeString();

                    tbody.innerHTML += `
                        <tr class="hover:bg-slate-800/30 transition-colors">
                            <td class="py-4 font-mono text-sm text-slate-300">${d.device_id}</td>
                            <td class="py-4">
                                <span class="px-2.5 py-1 text-xs font-medium border rounded-full status-badge ${badgeClass}">
                                    ${d.status}
                                </span>
                            </td>
                            <td class="py-4">
                                <div class="flex items-center ${batColor}">
                                    <svg class="w-4 h-4 mr-1" fill="currentColor" viewBox="0 0 20 20"><path d="M4 4a2 2 0 00-2 2v8a2 2 0 002 2h12a2 2 0 002-2V8a2 2 0 00-2-2h-1V2a1 1 0 00-1-1H9a1 1 0 00-1 1v2H4zm3 2h5v8H7V6z"></path></svg>
                                    ${d.battery_level}%
                                </div>
                            </td>
                            <td class="py-4 text-sm text-slate-400">${lastSync}</td>
                            <td class="py-4 text-right">
                                <button onclick="forceCommand('${d.device_id}', 'LOCK')" class="text-xs bg-slate-800 hover:bg-red-500/20 hover:text-red-400 border border-slate-700 px-3 py-1.5 rounded transition-colors mr-2">Lock</button>
                            </td>
                        </tr>
                    `;
                });
            } catch (err) {
                console.error(err);
            }
        }

        let sessionsOffset = 0;
        const SESSIONS_PAGE_SIZE = 10;
        let sessionsTotal = 0;
        let currentServerTime = Date.now();

        function renderSessionItem(s) {
            let statusColor = 'text-slate-400';
            let statusBg = '';
            let isActive = false;
            if (s.status === 'ACTIVE') { statusColor = 'text-emerald-400'; statusBg = 'border-emerald-500/30 bg-emerald-500/5'; isActive = true; }
            else if (s.status === 'EXPIRED') { statusColor = 'text-red-400/60'; statusBg = 'border-slate-700/30 bg-slate-800/30 opacity-60'; }
            else if (s.status === 'UNUSED') { statusColor = 'text-amber-400'; statusBg = 'border-amber-500/20 bg-amber-500/5'; }
            else { statusColor = 'text-slate-400'; statusBg = 'border-slate-700/50 bg-slate-800/50'; }

            const timeAgo = getTimeAgo(s.created_at, currentServerTime);

            if (s.status === 'EXPIRED') {
                // Compact single-line for expired sessions
                return `
                    <div class="px-3 py-1.5 rounded-lg border ${statusBg} flex justify-between items-center text-xs">
                        <span class="font-mono text-slate-500">${s.pin}</span>
                        <span class="text-slate-600">${s.duration_minutes}m</span>
                        <span class="${statusColor}">EXPIRED</span>
                        <span class="text-slate-600">${timeAgo}</span>
                    </div>
                `;
            }

            return `
                <div class="p-3 rounded-lg border ${statusBg} flex justify-between items-center">
                    <div>
                        <p class="font-mono text-white tracking-wider">${s.pin}</p>
                        <p class="text-xs text-slate-400 mt-1">${s.duration_minutes} mins • ${s.device_id || 'Not assigned'} • ${timeAgo}</p>
                    </div>
                    <span class="text-xs font-medium ${statusColor}">${s.status}</span>
                </div>
            `;
        }

        function getTimeAgo(dateStr, serverTime) {
            const now = new Date(serverTime);
            const created = new Date(dateStr.replace(' ', 'T') + 'Z'); // DB stores UTC
            const diffMs = now - created;
            const diffMins = Math.floor(diffMs / 60000);
            if (diffMins < 1) return 'just now';
            if (diffMins < 60) return `${diffMins}m ago`;
            const diffHours = Math.floor(diffMins / 60);
            if (diffHours < 24) return `${diffHours}h ago`;
            return `${Math.floor(diffHours / 24)}d ago`;
        }

        async function fetchSessions(append = false) {
            try {
                if (!append) sessionsOffset = 0;
                const res = await fetch(`${API_BASE}/sessions?limit=${SESSIONS_PAGE_SIZE}&offset=${sessionsOffset}`);
                const data = await res.json();
                
                sessionsTotal = data.total;
                const sessions = data.sessions;
                currentServerTime = data.server_time || Date.now();
                
                const list = document.getElementById('sessionsList');
                const countBadge = document.getElementById('sessionsCount');
                const showMoreContainer = document.getElementById('showMoreContainer');
                
                // Update total count badge
                if (sessionsTotal > 0) {
                    countBadge.textContent = sessionsTotal;
                    countBadge.classList.remove('hidden');
                } else {
                    countBadge.classList.add('hidden');
                }

                if (!append) list.innerHTML = '';
                
                if (sessionsTotal === 0) {
                    list.innerHTML = '<p class="text-slate-500 text-sm text-center py-4">No sessions yet.</p>';
                    showMoreContainer.classList.add('hidden');
                    return;
                }

                sessions.forEach(s => {
                    list.insertAdjacentHTML('beforeend', renderSessionItem(s));
                });

                // Show/hide "Show More" button
                const loadedCount = sessionsOffset + sessions.length;
                if (loadedCount < sessionsTotal) {
                    showMoreContainer.classList.remove('hidden');
                    document.getElementById('showMoreBtn').textContent = `Show More (${loadedCount} of ${sessionsTotal})`;
                } else {
                    showMoreContainer.classList.add('hidden');
                }
            } catch (err) {
                console.error(err);
            }
        }

        function loadMoreSessions() {
            sessionsOffset += SESSIONS_PAGE_SIZE;
            fetchSessions(true);
        }
        function toggleCustomDuration() {
            const select = document.getElementById('duration');
            const customContainer = document.getElementById('customDurationContainer');
            if (select.value === 'custom') {
                customContainer.classList.remove('hidden');
                document.getElementById('customHours').focus();
            } else {
                customContainer.classList.add('hidden');
            }
        }

        async function generatePin() {
            let mins = document.getElementById('duration').value;
            if (mins === 'custom') {
                const h = parseInt(document.getElementById('customHours').value) || 0;
                const m = parseInt(document.getElementById('customMins').value) || 0;
                mins = (h * 60) + m;
                if (mins <= 0) {
                    alert('Please enter a valid duration (hours/minutes must be > 0).');
                    return;
                }
            }
            
            try {
                const res = await fetch(`${API_BASE}/generate-pin`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ duration_minutes: parseInt(mins) })
                });
                const data = await res.json();
                
                if (data.pin) {
                    document.getElementById('pinResult').classList.remove('hidden');
                    document.getElementById('pinResult').classList.add('animate-[pulse_0.5s_ease-in-out]');
                    document.getElementById('generatedPinText').innerText = data.pin;
                    document.getElementById('generatedDuration').innerText = `Valid for ${data.duration_minutes} mins`;
                    
                    fetchSessions(); // Refresh list
                    
                    setTimeout(() => {
                        document.getElementById('pinResult').classList.remove('animate-[pulse_0.5s_ease-in-out]');
                    }, 500);
                }
            } catch (err) {
                alert('Error generating PIN');
            }
        }

        async function forceCommand(id, cmd) {
            if(!confirm(`Force ${cmd} device ${id}?`)) return;
            try {
                const res = await fetch(`${API_BASE}/device/${id}/force`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ command: cmd })
                });
                const data = await res.json();
                alert(data.message);
            } catch (err) {
                console.error(err);
            }
        }

        async function clearSessions() {
            if(!confirm("Are you sure you want to delete all sessions?")) return;
            try {
                const res = await fetch(`${API_BASE}/sessions`, { method: 'DELETE' });
                const data = await res.json();
                alert(data.message);
                fetchSessions();
            } catch (err) {
                console.error(err);
                alert('Error clearing sessions');
            }
        }

        async function clearDevices() {
            if(!confirm("Are you sure you want to delete all registered devices?")) return;
            try {
                const res = await fetch(`${API_BASE}/devices`, { method: 'DELETE' });
                const data = await res.json();
                alert(data.message);
                fetchDevices();
            } catch (err) {
                console.error(err);
                alert('Error clearing devices');
            }
        }

        // Initial fetch and setup polling
        fetchDevices();
        fetchSessions();
        setInterval(fetchDevices, 5000); // Poll every 5s
        setInterval(fetchSessions, 10000); // Poll sessions every 10s (auto-expire check)
    </script>

    <style>
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(30, 41, 59, 0.5); 
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(71, 85, 105, 0.8); 
            border-radius: 4px;
        }
    </style>
</body>
</html>
